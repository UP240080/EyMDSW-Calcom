[pytest]
# ---------------------------------------------------------------------------
# pytest.ini — Configuración global de pytest para la suite E2E de Cal.com
# ---------------------------------------------------------------------------

# Directorio raíz donde pytest busca pruebas
testpaths = tests

# Patrones de archivos y funciones de prueba
python_files  = test_*.py
python_classes = Test*
python_functions = test_*

# Marcadores personalizados registrados para evitar advertencias de PytestUnknownMarkWarning
markers =
    login: Pruebas relacionadas con el módulo de autenticación.
    booking: Pruebas relacionadas con el flujo de reserva de citas.
    smoke: Pruebas de humo (verificación básica de que el sistema levanta).
    regression: Pruebas de regresión completa.
    data_driven: Pruebas parametrizadas con múltiples conjuntos de datos.

# Opciones predeterminadas para cada ejecución
# -v          : salida detallada (nombre de cada prueba + resultado)
# --tb=short  : tracebacks cortos para mayor legibilidad en CI
addopts =
    -v
    --tb=short
    --strict-markers

# Tiempo máximo de espera por prueba (segundos) — requiere pytest-timeout
# timeout = 120

# Codificación de salida
log_cli = true
log_cli_level = INFO
log_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_date_format = %Y-%m-%d %H:%M:%S
